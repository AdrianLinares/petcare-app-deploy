# ============================================================================
# PetCare App — Docker Compose (Producción Local)
# ============================================================================
# Uso:
#   docker compose up -d                   # Inicia todo
#   docker compose logs -f                 # Ver logs
#   docker compose down -v                 # Baja y borra volúmenes
# ============================================================================

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — Base de datos
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: petcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: petcare_db
      POSTGRES_USER: petcare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed-database-fixed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare -d petcare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  # ──────────────────────────────────────────────
  # App — Servidor Express + Frontend Sirvo
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petcare-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://petcare:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/petcare_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-replace_with_strong_random_secret}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: "*"
      # Pusher (opcional — si no se configura, las notificaciones en tiempo real no funcionan)
      # PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      # PUSHER_KEY: ${PUSHER_KEY:-}
      # PUSHER_SECRET: ${PUSHER_SECRET:-}
      # PUSHER_CLUSTER: ${PUSHER_CLUSTER:-us2}
    ports:
      - "3000:3000"
    networks:
      - petcare-network

volumes:
  postgres_data:
    driver: local

networks:
  petcare-network:
    driver: bridge
