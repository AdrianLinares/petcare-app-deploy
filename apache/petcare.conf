# ============================================================================
# PetCare App — Configuración de VirtualHost para Apache
# ============================================================================
#
# Ubicación recomendada:
#   sudo cp apache/petcare.conf /etc/apache2/sites-available/petcare.conf
#   sudo a2ensite petcare
#   sudo a2enmod proxy proxy_http rewrite headers
#   sudo systemctl reload apache2
#
# Arquitectura:
#   Apache escucha en puerto 80/443
#   └─ Sirve /api/* → reverse proxy a Node.js (http://localhost:3000)
#   └─ Sirve /*      → archivos estáticos del frontend
#   └─ SPA fallback  → index.html para rutas no encontradas
#
# Requisitos:
#   - Apache 2.4+
#   - mod_proxy, mod_proxy_http, mod_rewrite, mod_headers habilitados
#   - Node.js 20+ corriendo el servidor Express en puerto 3000
# ============================================================================

<VirtualHost *:80>
    ServerName petcare.local
    ServerAdmin admin@petcare.local

    # ──────────────────────────────────────────────
    # Logging
    # ──────────────────────────────────────────────
    ErrorLog ${APACHE_LOG_DIR}/petcare-error.log
    CustomLog ${APACHE_LOG_DIR}/petcare-access.log combined

    # ──────────────────────────────────────────────
    # Static files — Frontend compilado (Vite build)
    # ──────────────────────────────────────────────
    DocumentRoot /var/www/petcare/frontend/dist

    <Directory /var/www/petcare/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA Fallback: si el archivo no existe, rewrite a index.html
        # (sin tocar las rutas /api)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # ──────────────────────────────────────────────
    # API Reverse Proxy — /api/* → Node.js :3000
    # ──────────────────────────────────────────────
    <Location /api>
        ProxyPass http://127.0.0.1:3000/api
        ProxyPassReverse http://127.0.0.1:3000/api

        # Headers para CORS y forward de IP real
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization"

        ProxyPreserveHost On
        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    </Location>

    # ──────────────────────────────────────────────
    # Preflight CORS (OPTIONS) — Apache responde directamente
    # ──────────────────────────────────────────────
    <Limit OPTIONS>
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization"
    </Limit>

    # ──────────────────────────────────────────────
    # Health check (opcional)
    # ──────────────────────────────────────────────
    <Location /health>
        ProxyPass http://127.0.0.1:3000/health
        ProxyPassReverse http://127.0.0.1:3000/health
    </Location>

</VirtualHost>

